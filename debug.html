<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeslaCast Debug</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0A0A0F; color: #F0F2FF;
      font-family: 'Courier New', monospace;
      height: 100vh; display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    /* HEADER */
    header {
      background: #111; border-bottom: 2px solid #E31937;
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 1.1rem; color: #E31937; letter-spacing: 0.1em; }
    #clock { font-size: 1rem; color: rgba(255,255,255,0.4); }

    /* MAIN — 2 colonnes */
    .main {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0; overflow: hidden;
    }

    /* COLONNE GAUCHE — vidéo + états */
    .left {
      border-right: 1px solid rgba(255,255,255,0.1);
      padding: 16px; display: flex; flex-direction: column; gap: 14px;
    }

    video {
      width: 100%; aspect-ratio: 16/9;
      background: #000; border-radius: 10px;
      border: 3px solid #333;
    }
    video.playing { border-color: #10B981; }
    video.paused  { border-color: #E31937; }

    .big-status {
      text-align: center; font-size: 2rem; font-weight: bold;
      padding: 16px; border-radius: 12px; letter-spacing: 0.05em;
    }
    .big-status.playing { background: rgba(16,185,129,0.2); color: #10B981; }
    .big-status.paused  { background: rgba(227,25,55,0.2);  color: #E31937; }

    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .stat-box {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 10px 14px;
    }
    .stat-box .label { font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
    .stat-box .value { font-size: 1.1rem; font-weight: bold; }
    .value.green  { color: #10B981; }
    .value.red    { color: #E31937; }
    .value.yellow { color: #F59E0B; }

    /* COLONNE DROITE — log */
    .right {
      display: flex; flex-direction: column; overflow: hidden;
    }
    .log-title {
      padding: 10px 16px; font-size: 0.7rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(255,255,255,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;
    }
    #log {
      flex: 1; overflow-y: auto; padding: 10px;
      scrollbar-width: thin;
    }
    .entry {
      display: flex; gap: 10px; align-items: baseline;
      padding: 5px 6px; border-radius: 6px; margin-bottom: 3px;
      border-left: 3px solid transparent;
    }
    .entry.media      { border-color: #3B82F6; }
    .entry.visibility { border-color: #E31937; }
    .entry.focus      { border-color: #10B981; }
    .entry.recover    { border-color: #F59E0B; }
    .entry.info       { border-color: #555; }
    .ets  { font-size: 0.7rem; color: rgba(255,255,255,0.3); flex-shrink: 0; }
    .etag {
      font-size: 0.68rem; font-weight: bold; flex-shrink: 0;
      padding: 1px 6px; border-radius: 4px; min-width: 80px; text-align: center;
    }
    .etag.media      { background: rgba(59,130,246,0.2);  color: #3B82F6; }
    .etag.visibility { background: rgba(227,25,55,0.2);   color: #E31937; }
    .etag.focus      { background: rgba(16,185,129,0.2);  color: #10B981; }
    .etag.recover    { background: rgba(245,158,11,0.2);  color: #F59E0B; }
    .etag.info       { background: rgba(255,255,255,0.07); color: #888; }
    .emsg { font-size: 0.82rem; line-height: 1.4; }
    .bad  { color: #E31937; font-weight: bold; }
    .good { color: #10B981; font-weight: bold; }
    .val  { color: #FFD700; }

    /* FOOTER */
    footer {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 8px 16px; display: flex; gap: 10px; align-items: center;
      background: #111;
    }
    .recover-toggle {
      display: flex; align-items: center; gap: 8px;
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.4);
      border-radius: 8px; padding: 6px 14px; cursor: pointer;
      font-size: 0.8rem; color: #10B981;
    }
    .recover-toggle.off { background: rgba(227,25,55,0.1); border-color: rgba(227,25,55,0.4); color: #E31937; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .recover-count { font-size: 0.8rem; color: #F59E0B; margin-left: auto; }
    .clear-btn {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      color: #aaa; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 0.8rem;
    }
  </style>
</head>
<body>

<header>
  <h1>⬡ TESLACAST DEBUG v2</h1>
  <div id="clock">--:--:--</div>
</header>

<div class="main">

  <!-- GAUCHE -->
  <div class="left">
    <video id="vid" autoplay muted loop
      src="https://www.w3schools.com/html/mov_bbb.mp4"></video>

    <div class="big-status playing" id="bigStatus">▶ EN LECTURE</div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="label">document.hidden</div>
        <div class="value green" id="sHidden">false</div>
      </div>
      <div class="stat-box">
        <div class="label">visibilityState</div>
        <div class="value green" id="sVis">visible</div>
      </div>
      <div class="stat-box">
        <div class="label">hasFocus</div>
        <div class="value green" id="sFocus">—</div>
      </div>
      <div class="stat-box">
        <div class="label">currentTime</div>
        <div class="value yellow" id="sTime">0.00s</div>
      </div>
    </div>
  </div>

  <!-- DROITE -->
  <div class="right">
    <div class="log-title">Événements en temps réel</div>
    <div id="log"></div>
  </div>

</div>

<footer>
  <div class="recover-toggle" id="recoverToggle" onclick="toggleRecover()">
    <div class="dot"></div>
    Reprise auto ON
  </div>
  <button class="clear-btn" onclick="clearLog()">Effacer</button>
  <div class="recover-count" id="recoverCount">0 reprise(s)</div>
</footer>

<script>
  const vid = document.getElementById('vid');
  let autoRecover = true;
  let recovering = false;
  let recoveries = 0;
  let logs = [];

  // Clock
  setInterval(() => {
    const n = new Date();
    document.getElementById('clock').textContent =
      [n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
  }, 500);

  function ts() {
    const n = new Date();
    return [n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':')
      + '.' + String(n.getMilliseconds()).padStart(3,'0');
  }

  function addLog(cat, label, html) {
    const t = ts();
    logs.push({t, cat, label, msg: html.replace(/<[^>]+>/g,'')});
    const el = document.createElement('div');
    el.className = 'entry ' + cat;
    el.innerHTML = `<span class="ets">${t}</span><span class="etag ${cat}">${label}</span><span class="emsg">${html}</span>`;
    const logEl = document.getElementById('log');
    logEl.appendChild(el);
    logEl.scrollTop = 99999;
  }

  // ── Video events ──
  vid.addEventListener('pause', () => {
    addLog('media', 'VIDEO PAUSE', `<span class="bad">⏸ PAUSE</span> à ${vid.currentTime.toFixed(2)}s`);
    updateVideoUI(true);
    if (autoRecover && !recovering) {
      recovering = true;
      addLog('recover', 'RECOVER', '🔄 Tentative de reprise…');
      setTimeout(() => {
        vid.play()
          .then(() => {
            recoveries++;
            document.getElementById('recoverCount').textContent = recoveries + ' reprise(s)';
            addLog('recover', 'RECOVER', `<span class="good">✅ Reprise OK !</span>`);
          })
          .catch(e => addLog('recover', 'RECOVER', `<span class="bad">❌ Échec : ${e.name}</span>`))
          .finally(() => { recovering = false; });
      }, 100);
    }
  });

  vid.addEventListener('play',    () => { addLog('media', 'VIDEO PLAY',    '<span class="good">▶ play</span>'); updateVideoUI(false); });
  vid.addEventListener('playing', () => { addLog('media', 'VIDEO PLAYING', '<span class="good">▶ playing</span>'); updateVideoUI(false); });
  vid.addEventListener('waiting', () => addLog('media', 'VIDEO WAIT', '<span class="val">⏳ waiting</span>'));
  vid.addEventListener('stalled', () => addLog('media', 'VIDEO STALL', '<span class="bad">⚠ stalled</span>'));

  function updateVideoUI(paused) {
    const bs = document.getElementById('bigStatus');
    const v = document.getElementById('vid');
    if (paused) {
      bs.textContent = '⏸ EN PAUSE'; bs.className = 'big-status paused';
      v.className = 'paused';
    } else {
      bs.textContent = '▶ EN LECTURE'; bs.className = 'big-status playing';
      v.className = 'playing';
    }
  }

  // ── Visibility events ──
  document.addEventListener('visibilitychange', () => {
    addLog('visibility', 'VISIBILITY',
      `hidden=<span class="${document.hidden?'bad':'good'}">${document.hidden}</span>  state=<span class="val">"${document.visibilityState}"</span>`);
  });

  // ── Focus events ──
  window.addEventListener('blur',  () => addLog('focus', 'WIN BLUR',  '<span class="bad">window perdu le focus</span>'));
  window.addEventListener('focus', () => addLog('focus', 'WIN FOCUS', '<span class="good">window a le focus</span>'));
  window.addEventListener('freeze',() => addLog('visibility', 'FREEZE', '<span class="bad">❄ PAGE FROZEN</span>'));
  window.addEventListener('resume',() => addLog('visibility', 'RESUME', '<span class="good">PAGE RESUMED</span>'));

  // ── Polling 300ms ──
  let lastH = document.hidden, lastV = document.visibilityState, lastF = document.hasFocus();
  setInterval(() => {
    const h = document.hidden, v = document.visibilityState, f = document.hasFocus(), p = vid.paused;
    if (h !== lastH) { addLog('visibility','POLL hidden', `<span class="${h?'bad':'good'}">${lastH}→${h}</span>`); lastH=h; }
    if (v !== lastV) { addLog('visibility','POLL vis',    `<span class="val">${lastV}→${v}</span>`); lastV=v; }
    if (f !== lastF) { addLog('focus','POLL focus',       `<span class="${f?'good':'val'}">${lastF}→${f}</span>`); lastF=f; }

    document.getElementById('sHidden').textContent = h;
    document.getElementById('sHidden').className = 'value ' + (h?'red':'green');
    document.getElementById('sVis').textContent = v;
    document.getElementById('sVis').className = 'value ' + (v==='visible'?'green':'red');
    document.getElementById('sFocus').textContent = f;
    document.getElementById('sFocus').className = 'value ' + (f?'green':'yellow');
    document.getElementById('sTime').textContent = vid.currentTime.toFixed(2)+'s';
    updateVideoUI(p);
  }, 300);

  function toggleRecover() {
    autoRecover = !autoRecover;
    const el = document.getElementById('recoverToggle');
    el.className = 'recover-toggle' + (autoRecover ? '' : ' off');
    el.innerHTML = `<div class="dot"></div> Reprise auto ${autoRecover?'ON':'OFF'}`;
    addLog('info', 'CONFIG', `Reprise auto : <span class="${autoRecover?'good':'bad'}">${autoRecover}</span>`);
  }

  function clearLog() { document.getElementById('log').innerHTML = ''; logs = []; }

  addLog('info', 'INIT', `UA Tesla : <span class="${/Tesla/i.test(navigator.userAgent)?'good':'val'}">${/Tesla/i.test(navigator.userAgent)?'OUI':'NON'}</span>`);
  addLog('info', 'INIT', 'Lance la vidéo → passe en Drive → observe');
</script>
</body>
</html>
